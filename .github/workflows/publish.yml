name: Publish

on:
  release:
    types:
      - published

permissions:
  id-token: write
  contents: read

concurrency:
  group: npm-publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Validate release tag format
        run: |
          TAG="${{ github.event.release.tag_name }}"
          case "$TAG" in
            v*) ;;
            *) echo "Release tag must start with 'v' (got: $TAG)"; exit 1 ;;
          esac

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate tag matches package version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Release tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Knip
        run: pnpm knip

      - name: Verify npm package does not already exist
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "$PACKAGE_NAME"@"$VERSION" version >/dev/null 2>&1; then
            echo "$PACKAGE_NAME@$VERSION is already published"
            exit 1
          fi

      - name: Publish to npm
        run: |
          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            npm publish --provenance --access public --tag beta
          else
            npm publish --provenance --access public
          fi
